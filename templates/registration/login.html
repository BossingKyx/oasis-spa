{% load static %}
<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="theme-color" content="#df742c">
  <title>Sign in — {{ OASIS.COMPANY_NAME }}</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="{% static 'css/app.css' %}">
</head>
<body>
<div class="login-wrap">
  <div class="login-card">
    <div class="logo-big"><span class="ph">O</span><img src="{% static 'img/oasis-logo.png' %}" alt="Oasis on the Go Spa" onerror="this.remove()"></div>
    <h1>Oasis on the Go Spa</h1>
    <p class="tag">Management System</p>
    {% if form.errors %}
      <div class="msg error">Wrong username or password. Please try again.</div>
    {% endif %}
    <form method="post">
      {% csrf_token %}
      <div class="field">
        <label for="id_username">Username</label>
        <input type="text" name="username" id="id_username" autofocus required autocapitalize="none">
      </div>
      <div class="field">
        <label for="id_password">Password</label>
        <input type="password" name="password" id="id_password" required>
      </div>
      <button type="submit" class="btn block">Sign in</button>
      <input type="hidden" name="next" value="{{ next }}">
    </form>
    <div class="demo-note">
      <strong>Demo accounts</strong><br>
      Owner — <code>owner</code> / <code>oasis123</code><br>
      Therapist — <code>therapist1</code> / <code>oasis123</code>
    </div>
  </div>
</div>
</body>
</html>
