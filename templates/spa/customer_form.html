{% extends 'spa/base.html' %}
{% block title %}New client — {{ OASIS.COMPANY_NAME }}{% endblock %}
{% block content %}
<div class="page-head"><h1>New client</h1></div>
<div class="card" style="max-width:520px">
  <form method="post">
    {% csrf_token %}
    {% for f in form %}
    <div class="field"><label>{{ f.label }}</label>{{ f }}{{ f.errors }}</div>
    {% endfor %}
    <button class="btn block" type="submit">Save client</button>
  </form>
</div>
{% endblock %}
